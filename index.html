<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Rally 3D - Championship</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #070b19;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* Relación de aspecto 16:9 estricta */
            max-width: 177.78vh; 
            max-height: 100vh;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            background-color: #000;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 10;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: linear-gradient(135deg, rgba(15,18,36,0.95) 0%, rgba(7,9,20,0.97) 100%);
        }

        .menu-content {
            background: rgba(20, 24, 46, 0.9);
            padding: 30px;
            border-radius: 12px;
            border: 3px solid #00ffcc;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
            max-width: 480px;
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.4rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00ffcc;
            color: #00ffcc;
            font-family: monospace;
        }

        .subtitle {
            color: #8a9ab0;
            margin-bottom: 20px;
            font-size: 0.95rem;
            font-family: monospace;
        }

        .setup-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-bottom: 25px;
        }

        .setup-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .setup-group label {
            font-size: 0.8rem;
            color: #00ffcc;
            margin-bottom: 6px;
            letter-spacing: 1px;
            font-weight: bold;
            font-family: monospace;
        }

        .setup-group select {
            width: 100%;
            max-width: 320px;
            background-color: #0f111a;
            border: 2px solid #222533;
            color: #ffffff;
            padding: 10px;
            font-size: 0.95rem;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
            font-family: monospace;
            text-align: center;
        }

        .setup-group select:focus {
            border-color: #00ffcc;
        }

        .btn-arcade {
            background-color: #ff0055;
            color: #ffffff;
            border: none;
            padding: 12px 35px;
            font-size: 1.15rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 0 #b3003b, 0 8px 15px rgba(255, 0, 85, 0.4);
            transition: all 0.1s;
            letter-spacing: 2px;
            font-family: monospace;
            width: 100%;
            max-width: 320px;
        }

        .btn-arcade:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b3003b, 0 4px 8px rgba(255, 0, 85, 0.4);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        
        <canvas id="gameCanvas"></canvas>

        <div id="menuStart" class="menu-overlay">
            <div class="menu-content">
                <h1>RETRO RALLY 3D</h1>
                <div class="subtitle">ARCADE CHAMPIONSHIP ENGINE</div>
                
                <div class="setup-grid">
                    <div class="setup-group">
                        <label>SELECCIONAR VEHÍCULO</label>
                        <select id="selectVehicle">
                            <option value="0">VW Escarabajo (Manejo Agudo)</option>
                            <option value="1">Coupé GT (Velocidad Equilibrada)</option>
                            <option value="2">V12 Hypercar (Velocidad Extrema)</option>
                        </select>
                    </div>

                    <div class="setup-group">
                        <label>NIVEL DE DIFICULTAD IA</label>
                        <select id="selectDifficulty">
                            <option value="0">Fácil (Rivales casuales)</option>
                            <option value="1" selected>Media (Rivales competitivos)</option>
                            <option value="2">Difícil (Rivales ultra rápidos)</option>
                        </select>
                    </div>
                    
                    <div class="setup-group">
                        <label>CIRCUITO (DURACIÓN)</label>
                        <select id="selectTrack">
                            <option value="0">Desert Sprint (~3 min)</option>
                            <option value="1">Alpine Climb (~4 min)</option>
                            <option value="2">Forest Ridge (~5 min)</option>
                        </select>
                    </div>
                </div>

                <button id="btnStartRace" class="btn-arcade">CHAMPIONSHIP START</button>
            </div>
        </div>

        <div id="menuGameOver" class="menu-overlay hidden">
            <div class="menu-content">
                <h1 id="goTitle">FIN DE CARRERA</h1>
                <div id="goReason" class="subtitle" style="margin-top: 15px; white-space: pre-line;"></div>
                <button class="btn-arcade" onclick="resetRaceState()" style="margin-top: 15px;">VOLVER AL MENÚ</button>
            </div>
        </div>

    </div>

    <script src="game.js"></script>
</body>
</html>
